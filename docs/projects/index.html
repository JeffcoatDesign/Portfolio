---
layout: default
title: Projects
---
<div class="project-grid">
    {% for project in site.projects %}
    
    <a class="card" href="{{ site.baseurl }}{{ project.url }}">
        <img src="{{ project.image }}" alt="{{ project.title }}">
        <div>
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>
        </div>
    </a>
    
    {% endfor %}
</div>
