<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/portfolio.css">
</head>
<body>
    {% include header.html %}
    <div class="title-area">
        <img src="{{ page.image }}">
        <div class="overlay">
            <h1>{{ page.title}}</h1>
            <p>{{page.description}}</p>
            {% if page.gitlink %}
            <a class="button" href="{{ page.gitlink }}">Github</a>
            {% endif %}
        </div>
    </div>
    <section>
    {% if page.yturl %}
        <iframe width="640" height="360" src="{{ page.yturl }}"></iframe>
    {% endif %}
    {{ content }}
    </section>
</body>
</html>
