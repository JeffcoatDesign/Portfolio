<!DOCTYPE html>
<html lang="en">
<div class="content-wrapper">
    <head>
        <title>{{ page.title }}</title>
        <link rel="stylesheet" href="{{ site.baseurl }}/assets/portfolio.css">
        <link rel="stylesheet" href="{{ site.baseurl }}/assets/code.css">
    </head>
    <body>
        {% include header.html %}
        <div class="title-area">
            <img src="{{ page.image }}">
            <div class="overlay">
                <h1>{{ page.title}}</h1>
                <p>{{page.description}}</p>
                {% if page.playlink %}
                    <a class="button" href="{{ page.playlink }}">Play</a>
                {% endif %}
                {% if page.gitlink %}
                    <a class="button" href="{{ page.gitlink }}">Github</a>
                {% endif %}
            </div>
        </div>
        <section>
            {% if page.yturl %}
                <div class="center">
                    <iframe width="560" height="315" src="{{ page.yturl }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
            {% endif %}
            {% if page.webgllink %}
                <div class="game-container">
                    <iframe 
                        src="{{ page.webgllink }}"
                        width="960"
                        height="600"
                        frameborder="0"
                        scrolling="no"
                        allowfullscreen>
                    </iframe>
                </div>
            {% endif %}
        {{ content }}
        </section>
        {% include footer.html %}
    </body>
    </div>
</html>
