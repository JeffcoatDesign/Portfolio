<header>
    <nav>
        <h1>{{ page.title }}</h1>
        {% for item in site.nav %}
            <a href="{{ item.url }}"
               class="{% if page.url == item.url or page.url contains item.url and item.url != '/' %}active{% endif %}">
               >{{ item.name }}
            </a>
        {% endfor %}
    </nav>
</header>
